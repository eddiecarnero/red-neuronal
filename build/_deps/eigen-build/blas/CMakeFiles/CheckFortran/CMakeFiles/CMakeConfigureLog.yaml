      Error catastrófico (Excepción de HRESULT: 0x8000FFFF (E_UNEXPECTED))
      The operation could not be completed. El parámetro no es correcto. 
      
      Uso:
      devenv  [archivosolución | archivoproyecto | carpeta | cualquierarchivo.ext]  [modificadores]
      
      El primer argumento de devenv suele ser un archivo de proyecto o de solución o una carpeta.
      También puede usar cualquier otro archivo como primer argumento si desea que 
      el archivo se abra automáticamente en un editor. Cuando especifica un archivo de proyecto, el IDE
      busca un archivo .sln con el mismo nombre base que el archivo de proyecto en el directorio
      primario del archivo de proyecto. Si no existe un archivo .sln, el IDE
      busca un único archivo .sln que haga referencia al proyecto. Si no existe ese archivo
      .sln único, el IDE crea una solución sin guardar con un nombre de archivo .sln
      predeterminado que tenga el mismo nombre base que el archivo de proyecto.
      
      Sintaxis de la línea de comandos:
      devenv archivosolución.sln /build [ configuraciónsolución ] [ /project nombreproyectooarchivo [ /projectconfig nombre ] ]
      Modificadores de la línea de comandos disponibles:
      
      /Build			Compila la solución o proyecto con la configuración de
      			solución especificada. Por ejemplo "Debug". Si se pueden utilizar
      			varias plataformas, el nombre de la configuración se
      			debe encerrar entre comillas y debe contener el nombre de la plataforma. Por ejemplo: "Debug|Win32".
      /Clean			Elimina los resultados de la compilación.
      /Command		Inicia el IDE y ejecuta el comando.
      /Deploy			Compila y, a continuación, implementa la configuración de compilación especificada.
      /DoNotLoadProjects	Abre la solución especificada sin cargar ningún proyecto.
      /Edit			Abre los archivos especificados en una instancia de la aplicación
      			en ejecución. Si no hay instancias en ejecución, iniciará
      			una nueva instancia con un diseño de ventana simplificado.
      /LCID			Establece el lenguaje predeterminado en el IDE para la IU.
      /Log			Registra la actividad del IDE en el archivo especificado para la solución de problemas.
      /NoVSIP			Deshabilita la clave de licencia del desarrollador VSIP para pruebas VSIP.
      /Out			Anexa el registro de compilación a un archivo especificado.
      /Project		Especifica el proyecto que se va a compilar, limpiar o implementar.
      			Se debe usar con /Build, /Rebuild, /Clean o /Deploy.
      /ProjectConfig		Invalida la configuración del proyecto especificada en la configuración
      			de la solución. Por ejemplo "Debug". Si pueden darse varias
      			plataformas, el nombre de la configuración se debe encerrar entre comillas
      			y contener el nombre de la plataforma. Por ejemplo: "Debug|Win32".
      			Se debe usar con /Project.
      /Rebuild		Limpia y, a continuación, compila la solución o el proyecto
      			con la configuración especificada.
      /ResetSettings		Restaura la configuración predeterminada del IDE y, opcionalmente,
      			restablece el archivo de VSSettings especificado.
      /ResetSkipPkgs		Borra todas las etiquetas SkipLoading agregadas a VSPackages.
      /Run			Compila y ejecuta la solución especificada.
      /RunExit		Compila y ejecuta la solución especificada y, a continuación, cierra el IDE.
      /SafeMode		Inicia el IDE en modo seguro y carga el número mínimo de ventanas.
      /Upgrade		Actualiza el proyecto o la solución y todos los proyectos que contiene.
      			Se creará una copia de seguridad de estos archivos según se estime oportuno. Consulte
      			el tema de ayuda sobre el "Asistente para conversión de Visual Studio" si desea
      			obtener más información sobre el proceso de copia de seguridad.
      
      Modificadores específicos del producto:
      
      /debugexe	Abrir el archivo ejecutable especificado que se va a depurar. El resto de
      		archivo ejecutable como sus argumentos.
      /diff		Compara dos archivos.  Toma cuatro parámetros:
      		SourceFile, TargetFile, SourceDisplayName(opcional),
      		TargetDisplayName(opcional)
      /TfsLink	Abre Team Explorer e inicia un visor para el URI de artefacto 
      		proporcionado si hay alguno registrado.
      /useenv		Utilizar las variables de entorno PATH, INCLUDE, LIBPATH y LIB
      		en lugar de las rutas de acceso IDE para compilaciones de VC++.
      
      Para asociar el depurador desde la línea de comandos, utilice:
      	VsJITDebugger.exe -p <pid>
      
      
